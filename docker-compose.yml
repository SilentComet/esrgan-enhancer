# Docker Compose Configuration for ESRGAN Image Enhancement Platform
# Authored by: DevOps Engineering Team
# Date: April 2026
# Version: 1.0
# Description: Orchestrates backend API, Redis queue, and frontend services with GPU support

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: esrgan_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - esrgan_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: esrgan_backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
      - MAX_FILE_SIZE=10485760
      - ENABLE_CUDA=${ENABLE_CUDA:-true}
      - MODEL_PRECISION=${MODEL_PRECISION:-fp32}
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
      - model_weights:/app/ml/weights
      - upload_temp:/tmp/uploads
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - esrgan_network
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: esrgan_celery
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENABLE_CUDA=${ENABLE_CUDA:-true}
      - MODEL_PRECISION=${MODEL_PRECISION:-fp32}
    volumes:
      - ./backend:/app
      - model_weights:/app/ml/weights
      - upload_temp:/tmp/uploads
    depends_on:
      - redis
      - backend
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - esrgan_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: esrgan_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - esrgan_network
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  model_weights:
    driver: local
  upload_temp:
    driver: local

networks:
  esrgan_network:
    driver: bridge
